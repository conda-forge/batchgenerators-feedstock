schema_version: 1

context:
  name: batchgenerators
  version: 0.25.3

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/batchgenerators-${{ version }}.tar.gz
  sha256: fa69448c4bb119b175820f85eeaeea81d95f599a09da654d8cff22942088f42d
  patches:
    - python3.patch  # Based on https://github.com/MIC-DKFZ/batchgenerators/pull/130

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - pillow >=7.1.2
    - numpy >=1.10.2
    - scipy
    - scikit-image
    - scikit-learn
    - future
    - pandas
    - threadpoolctl
    - unittest2
tests:
  - python:
      imports:
        - batchgenerators
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: Data augmentation toolkit
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/MIC-DKFZ/batchgenerators

extra:
  recipe-maintainers:
    - jan-janssen
